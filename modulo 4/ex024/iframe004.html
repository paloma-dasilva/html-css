<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframes</title>
<style>
    iframe {
        height: 50vh;
        width: 80vw;
        display: block;
        border: 2px dashed #000;
        margin: auto;
    }
</style>
</head>
<body>
    <h1>Site principal</h1>

    <iframe src="pag4.html" frameborder="0" sandbox="allow-same-origin allow-forms allow-scripts" referrerpolicy="noreferrer">
        <p>Seu navegador não suporta iframes.</p>

    </iframe>
</body>
</html>
