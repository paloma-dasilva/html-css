<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body{ 
            font-family: sans-serif;
        }

        a {
            color:#0F1B26;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited {
            color: #0b5fdd;

        }

        a:hover { 
             text-decoration: underline;
        }

        a:active {
            color: rgb(70, 186, 240);
        }


        .especial::before {
            content: '▶️';
        }
    </style>

</head>
<body>
    <h1>Personalizando Links</h1>

    <ul>
        <li><a href="https://gustavoguanabara.github.io" target="_blank">Repositório GitHub</a></li>
        <li><a class="especial" href="https://youtube.com/cursoemvideo/" target="_blank">Canal YouTube</a></li>
        <li><a href="https://www.cursoemvideo.com" target="_blank">Site do CursoemVideo</a></li>
    </ul>


</body>
</html>
