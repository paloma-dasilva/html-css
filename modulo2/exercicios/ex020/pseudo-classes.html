<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-classes</title>
    <style>
        div {
            display: inline-block;
            background-color:#0F1B26;
            border: 1px solid #5f83e9;
            color: aliceblue;
            height: 200px;
            width: 200px;
            text-align: center;
        }   

        div:hover{
        background-color: #5f83e9;
        border-radius: 10px;
        border-color: rgb(0, 0, 0);

        }

    </style>
</head>
<body>

    <div id="d1">1</div>
    <div id="d2">2</div>
    <div id="d3">3</div>

</body>
</html>
