<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de box level </title>

    <style>
        h1 { 
            height: 300px;
            width: 300px;
            background-color: rgba(173, 182, 230, 0.753);


            border: 10px solid rgb(1, 8, 20);

            padding: 10px;
         
            margin: 20px auto 40px auto;

            outline: 5px dashed blueviolet;
            
        }

        a { 
            border-width: 15px;
            border-style: solid;
            border-color: cadetblue;
            padding: 10px;
        }

     
       

    </style>
</head>
<body>
    <h1>Exemplo de caixa de box level</h1>

<p>Paragrafos sao exemplos de box level, mas <a href="#">links</a> são exemplos de caixas inline-level.</p>


</body>
</html>
