<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabelas</title>

    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
      }

      table {
        height: 400px;
        width: 400px;
        border: 2px solid black;
        border-collapse: collapse;
        background-color: white;



        td {
          border: 1px solid black;
          text-align: center;
          vertical-align: bottom;
        }

        .numero {
            text-align: right;
            vertical-align: middle;
        }
      }
    </style>
  </head>
  <body>
    <h1>Tabelas no HTML</h1>
    <!---
HIERARQUIA DE TABELAS (SIMPLES)
TABLE
TABLE ROW (TR)
TABLE HEADER (TH)
TABLE DATA (TD)
-->

    <table>
      <tr>
        <!---Primeira linha-->
        <td>A1</td>
        <td>B1</td>
        <td>C1</td>
      </tr>

      <tr>
        <!---segunda linha-->
        <td>A2</td>
        <td>B2</td>
        <td>C2</td>
      </tr>

      <tr>
        <!---terceira linha-->
        <td>A3</td>
        <td>B3</td>
        <td>C3</td>
      </tr>

      <tr>
        <!---quarta linha-->
        <td>A4</td>
        <td>B4</td>
        <td class="numero">100</td>
      </tr>
    </table>
  </body>
</html>
