<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>exercicios de tabelas</title>

    <style>
        table {
            font-family: Arial, Helvetica, sans-serif;
            border: 1px solid black;
            border-collapse: collapse;
            width: 50%;

            tr, th, td {
                border: 1px solid black;
                padding: 10px;
                text-align: center;
            }
            .cnome {
                background-color: rgb(2, 81, 185);
                color: white;
            }
        }
    </style>
</head>
<body>
    <table>
        <colgroup>
            <col class="cnome">
            <col class="csexo">
            <col class="cidade">
            <col class="cprofissao">
        </colgroup>

        <caption>Cadastro</caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col"> Profissão</th>
        </tr>

        <tr>
            <td>Maria</td>
            <td>Feminino</td>
            <td>30</td>
            <td>Engenheira</td>
        </tr>

        <tr>
            <td>João</td>
            <td>Masculino</td>
            <td>25</td>
            <td>Programador</td>
        </tr>

        <tr>
            <td>Ana</td>
            <td>Feminino</td>
            <td>28</td>
            <td>Designer</td>
        </tr>

        <tr>
            <td>Pedro</td>
            <td>Masculino</td>
            <td>35</td>
            <td>Gerente</td>
        </tr>

        <tr>
            <td>Carla</td>
            <td>Feminino</td>
            <td>22</td>
            <td>Estudante</td>
        </tr>
    </table>
</body>
</html>
