<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesclagem de Células</title>

    <STYLE>
       table {
            border: 1px solid black;
            border-collapse: collapse;
            width: 500px;

            tr td {
                border: 1px solid black;
                padding: 10px;
                text-align: center;
            }
       }    

    </STYLE>
</head>
<body>
    <H1>Mesclagem de Células</H1>

    <table>
        <tr>
            <td>A</td>
            <TD colspan="2">B</TD>

        </tr>

        <TR>
            <TD>D</TD>
            <TD>E</TD>
            <TD rowspan="2">F</TD>
        </TR>

        <TR>
       
            <TD rowspan="2">H</TD>
            <TD>I</TD>
        </TR>

        <tr>
   
            <td>K</td>
            <td>L</td>
        </tr>
    </table>


</body>
</html>
