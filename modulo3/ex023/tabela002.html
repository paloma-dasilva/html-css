<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas no HTML</title>
</head>
<style>
body {
    font-family: Arial, Helvetica, sans-serif;
}

table {
    width: 500px;
    border-collapse: collapse;

    thead {
        background-color: #313131;
        color: white;
    }

    tr {
        td,th {
            border: 1px solid black;
            text-align: center;
            vertical-align: bottom;
            padding: 10px;

        }
    }

    .numero {
        text-align: right;
        vertical-align: middle;
    }
}

</style>
<body>
    <h1>Uso de tabelas grandes</h1>

    <!---
    ANATOMIA PARA TABELAS GRANDES
    TABLE
        THEAD
            TR, TD, TH
        TBODY
            TR, TD, TH 
        TFOOT
            TR, TD, TH
    -->

    <table>
        <thead>
            <tr>
                <th>Estado</th>
                <th>População</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>São Paulo</td>
                <td class="numero">12.300.000</td>
            </tr>

            <tr>
                <td>Minas Gerais</td>
                <td class="numero">21.000.000</td>
            </tr>

            <tr>
                <td>Rio de Janeiro</td>
                <td class="numero">13.000.000</td>
            </tr>

            <tr>
                <td>Bahia</td>
                <td class="numero">14.000.000</td>
            </tr>

            <tr>
                <td>Paraná</td>
                <td class="numero">11.000.000</td>
            </tr>

            <tr>
                <td>Rio Grande do Sul</td>
                <td class="numero">11.000.000</td>
            </tr>

        </tbody>

        <tfoot>
            <tr>
                <th>Total de habitantes</th>
               
                    <td class="numero"><strong>0000</strong></td>
               
            </tr>
        </tfoot>

    </table>
</body>
</html>
